<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger</title>
    <link href="style.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js" defer></script>
    <script defer src="app.js"></script>
</head>
<body>

<div id="auth-container">
    <div class="auth-box">
        <h2 id="auth-title">Login</h2>
        <form id="auth-form">
            <input type="text" id="username-input" placeholder="Username" required>
            <input type="password" id="password-input" placeholder="Password" required>
            <button type="submit" id="auth-submit">Login</button>
        </form>
        <p id="auth-toggle">Don't have an account? <a href="#">Register</a></p>
        <p id="auth-message"></p>
    </div>
</div>

<main class="app-container" id="chat-container" style="display: none;">

    <aside class="side-bar">
        <div class="sidebar-header">
            <h2>Chats</h2>
            <button id="logout-btn">Logout</button>
        </div>

        <div class="search-container">
            <input type="text" id="user-search" placeholder="Search users...">
        </div>

        <div class="section chat-list-wrapper">
            <ul id="chat-list" class="user-list">
            </ul>
        </div>

        <input type="hidden" id="name" readonly>
    </aside>

    <section class="chat-window">

        <header class="chat-header">
            <div class="header-info">
                <h2 id="current-room-display">Select a chat to start</h2>
                <p class="activity"></p>
            </div>
            <button id="back-to-room-btn" style="display: none;">Back</button>
        </header>

        <ul class="chat-display">
            <div class="welcome-screen">
                <p>Welcome! Search for a user on the left to start messaging.</p>
            </div>
        </ul>

        <footer class="input-area">
            <form class="form-msg">
                <input type="text" id="message" placeholder="Type a message..." autocomplete="off">
                <button type="submit" class="send-button">Send</button>
            </form>
        </footer>

    </section>
</main>

</body>
</html>
