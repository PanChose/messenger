<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger</title>
    <link href="style.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js" defer></script>
    <script defer src="app.js"></script>
</head>
<body>
<main class="app-container">
    <aside class="side-bar">
        <div class="sidebar-header">
            <h2>Messenger</h2>
        </div>

        <div class="section">
            <h3>Rooms</h3>
            <ul class="room-list"></ul>
        </div>

        <div class="section">
            <h3>Users</h3>
            <ul class="user-list"></ul>
        </div>

        <form class="form-join">
            <input type="text" id="name" maxlength="8" placeholder="Your name" required>
            <input type="text" id="room" placeholder="Room name" required>
            <button id="join" type="submit">Join Room</button>
        </form>
    </aside>

    <section class="chat-window">
        <header class="chat-header">
            <h2 id="current-room-display">Select a Room</h2>
            <p class="activity"></p>
        </header>

        <ul class="chat-display">
        </ul>

        <footer class="input-area">
            <form class="form-msg">
                <input type="text" id="message" placeholder="Type a message..." autocomplete="off" required>
                <button type="submit" class="send-button">Send</button>
            </form>
        </footer>
    </section>
</main>
</body>
</html>
