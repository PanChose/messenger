<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger</title>
    <link href="style.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js" defer></script>
    <script defer src="app.js"></script>
</head>
<body>
<div id="auth-container">
    <div class="auth-box">
        <h2 id="auth-title">Login</h2>
        <form id="auth-form">
            <input type="text" id="username-input" placeholder="Username" required>
            <input type="password" id="password-input" placeholder="Password" required>
            <button type="submit" id="auth-submit">Login</button>
        </form>
        <p id="auth-toggle">Don't have an account? <a href="#">Register</a></p>
        <p id="auth-message"></p>
    </div>
</div>

<main class="app-container" id="chat-container" style="display: none;">
    <aside class="side-bar">
        <div class="sidebar-header">
            <h2>Messenger</h2>
        </div>
        <div class="section">
            <h3>Rooms</h3>
            <ul class="room-list"></ul>
        </div>
        <div class="section">
            <h3>Users</h3>
            <ul class="user-list"></ul>
        </div>
        <form class="form-join">
            <input type="text" id="name" maxlength="8" placeholder="Your name" readonly>
            <input type="text" id="room" placeholder="Room name" required>
            <button id="join" type="submit">Join Room</button>
        </form>
        <button id="logout-btn" style="margin-top: auto;">Logout</button>
    </aside>

    <section class="chat-window">
        <header class="chat-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <h2 id="current-room-display">Select a Room</h2>
                <button id="back-to-room-btn" style="display: none; padding: 5px 10px; background: #444; border: none; color: white; border-radius: 5px; cursor: pointer; font-size: 0.8rem;">🔙 Back to Room</button>
            </div>
            <p class="activity"></p>
        </header>
        <ul class="chat-display"></ul>
        <footer class="input-area">
            <form class="form-msg">
                <input type="text" id="message" placeholder="Your message" required>
                <button type="submit">Send</button>
            </form>
        </footer>
    </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script src="app.js"></script>
</body>
</html>
